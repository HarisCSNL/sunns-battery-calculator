document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

A0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"42159f7a-9c1f-48a1-910f-f3f36d9d772b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"30a2d975-7028-4baa-9c06-64feabf4b11e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ========================================================\n   Sunns Thuisbatterij Calculator — design system\n   Voice: helder · ontspannen · vertrouwd · zorgeloos\n   ======================================================== */\n\n:root {\n  /* Warm off-white base palette */\n  --bg: #FFFFFF;\n  --bg-raised: #FBFBF8;\n  --bg-soft: #F3F1EA;\n  --bg-sand: #EBE8DE;\n\n  --ink: #16130E;\n  --ink-2: #3A342A;\n  --ink-3: #6A6356;\n  --ink-4: #9A9283;\n  --hairline: #E8E5DB;\n  --hairline-strong: #D4CFBE;\n\n  /* Sunns green — warm forest */\n  --green: #2E6B46;\n  --green-hover: #245638;\n  --green-soft: #E4EDE3;\n  --green-ink: #1B3E28;\n\n  /* Sun accent — used sparingly */\n  --sun: #E8B84A;\n  --sun-soft: #F5E9C3;\n\n  /* Warning */\n  --warn: #B65A28;\n  --warn-soft: #F6E4D4;\n  --error: #A83A2E;\n\n  /* Tweakable */\n  --accent: var(--green);\n  --accent-hover: var(--green-hover);\n  --accent-soft: var(--green-soft);\n  --accent-ink: var(--green-ink);\n\n  --radius-sm: 8px;\n  --radius: 14px;\n  --radius-lg: 20px;\n  --radius-xl: 28px;\n\n  --shadow-sm: 0 1px 2px rgba(22, 19, 14, 0.04), 0 1px 1px rgba(22, 19, 14, 0.03);\n  --shadow: 0 2px 6px rgba(22, 19, 14, 0.05), 0 10px 30px -12px rgba(22, 19, 14, 0.12);\n  --shadow-lg: 0 6px 14px rgba(22, 19, 14, 0.06), 0 24px 60px -20px rgba(22, 19, 14, 0.18);\n\n  --t-fast: 160ms cubic-bezier(.2,.7,.3,1);\n  --t: 260ms cubic-bezier(.2,.7,.3,1);\n  --t-slow: 420ms cubic-bezier(.2,.7,.3,1);\n\n  --sans: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --display: 'Montserrat', ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--sans);\n  font-size: 16px;\n  line-height: 1.5;\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  min-height: 100vh;\n}\n\n/* Subtle paper texture */\nbody::before {\n  content: '';\n  position: fixed; inset: 0;\n  pointer-events: none;\n  background-image:\n    radial-gradient(circle at 20% 0%, rgba(46,107,70,0.04), transparent 60%),\n    radial-gradient(circle at 100% 100%, rgba(232,184,74,0.05), transparent 50%);\n  z-index: 0;\n}\n\nbutton { font-family: inherit; cursor: pointer; border: 0; background: none; padding: 0; color: inherit; }\ninput, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }\ninput[type=\"number\"]::-webkit-outer-spin-button,\ninput[type=\"number\"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }\ninput[type=\"number\"] { -moz-appearance: textfield; }\n\n/* =====================  LAYOUT  ===================== */\n\n.app {\n  max-width: 760px;\n  margin: 0 auto;\n  padding: 24px 20px 80px;\n  position: relative;\n  z-index: 1;\n}\n\n.topbar {\n  display: flex;\n  align-items: center;\n  justify-content: flex-start;\n  padding: 8px 4px;\n  margin-bottom: 28px;\n}\n.brand {\n  display: inline-flex; align-items: center;\n  text-decoration: none;\n}\n.brand-logo {\n  height: 28px;\n  width: auto;\n  display: block;\n}\n.brand-mark {\n  width: 30px; height: 30px; border-radius: 50%;\n  background: var(--accent);\n  display: grid; place-items: center;\n  color: white; font-weight: 700; font-size: 13px;\n}\n.brand-name { font-family: var(--sans); font-weight: 600; font-size: 22px; letter-spacing: -0.02em; color: var(--ink); }\n.brand-name em { font-style: normal; color: var(--accent); }\n\n.topbar-right {\n  font-size: 13px; color: var(--ink-3);\n  display: flex; align-items: center; gap: 16px;\n}\n.topbar-right a { color: var(--ink-2); text-decoration: none; }\n.topbar-right a:hover { color: var(--accent); }\n\n/* Progress */\n.progress {\n  display: flex; align-items: center; gap: 12px;\n  margin-bottom: 28px;\n  font-size: 13px; color: var(--ink-3);\n  letter-spacing: 0.01em;\n}\n.progress-track {\n  flex: 1; height: 4px; background: var(--bg-sand);\n  border-radius: 999px; overflow: hidden;\n}\n.progress-fill {\n  height: 100%; background: var(--accent);\n  width: 0;\n  transition: width var(--t-slow);\n}\n.progress-label { font-variant-numeric: tabular-nums; white-space: nowrap; }\n\n/* =====================  SCREENS  ===================== */\n\n.screen {\n  display: none;\n  animation: slideIn var(--t-slow) both;\n}\n.screen.active { display: block; }\n@keyframes slideIn {\n  from { opacity: 0; transform: translateY(8px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n.eyebrow {\n  display: inline-block;\n  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;\n  color: var(--accent);\n  font-weight: 500;\n  padding: 4px 10px;\n  background: var(--accent-soft);\n  border-radius: 999px;\n  margin-bottom: 16px;\n}\n\nh1, h2, h3 { letter-spacing: -0.02em; color: var(--ink); font-weight: 500; }\nh1.display {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: clamp(34px, 5.5vw, 52px);\n  line-height: 1.05;\n  letter-spacing: -0.02em;\n  margin: 0 0 18px;\n}\nh1.display em { font-style: italic; color: var(--accent); font-weight: 400; }\n\nh2.section-title {\n  font-family: var(--display);\n  font-size: clamp(28px, 4vw, 40px);\n  line-height: 1.1;\n  font-weight: 400;\n  letter-spacing: -0.015em;\n  margin: 0 0 8px;\n}\nh3.sub-title {\n  font-size: 13px; font-weight: 500;\n  color: var(--ink-4);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  margin: 0 0 10px;\n}\n\n.lede {\n  font-size: 17px; color: var(--ink-2); line-height: 1.55;\n  max-width: 56ch;\n  margin: 0 0 28px;\n}\n\n/* =====================  INTRO  ===================== */\n\n.intro {\n  padding: 8px 0 0;\n}\n.intro-mark {\n  width: 64px; height: 64px; border-radius: 50%;\n  display: grid; place-items: center;\n  background: var(--accent-soft);\n  color: var(--accent-ink);\n  margin-bottom: 22px;\n}\n.intro-benefits {\n  list-style: none; padding: 0; margin: 28px 0 36px;\n  display: grid; gap: 14px;\n}\n.intro-benefits li {\n  display: flex; align-items: flex-start; gap: 14px;\n  padding: 18px 20px;\n  background: var(--bg-raised);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n}\n.intro-benefits li svg {\n  flex-shrink: 0; color: var(--accent);\n  margin-top: 1px;\n}\n.intro-benefits li > div strong {\n  display: block; font-weight: 500; font-size: 15px; margin-bottom: 2px;\n}\n.intro-benefits li > div span {\n  font-size: 14px; color: var(--ink-3);\n}\n\n.intro-footer-note {\n  margin-top: 24px;\n  font-size: 13px; color: var(--ink-3);\n  display: flex; align-items: center; gap: 8px;\n}\n\n/* =====================  WIZARD  ===================== */\n\n.card {\n  background: var(--bg-raised);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius-lg);\n  padding: 32px;\n}\n@media (max-width: 640px) {\n  .card { padding: 24px 20px; border-radius: var(--radius); }\n}\n\n.q { margin-bottom: 28px; }\n.q:last-child { margin-bottom: 0; }\n.q-label {\n  display: block;\n  font-size: 16px; font-weight: 700;\n  color: var(--ink);\n  margin-bottom: 12px;\n  letter-spacing: -0.005em;\n}\n.q-sub {\n  font-size: 13.5px; color: var(--ink-3);\n  margin: -4px 0 12px;\n  line-height: 1.45;\n}\n.q-hint {\n  display: flex; align-items: flex-start; gap: 6px;\n  font-size: 13px; color: var(--ink-3);\n  margin-top: 8px; line-height: 1.45;\n}\n.q-hint svg { flex-shrink: 0; margin-top: 2px; color: var(--ink-4); }\n\n/* Option buttons (radio cards) */\n.opts {\n  display: grid; gap: 10px;\n}\n.opts.opts-row { grid-template-columns: 1fr 1fr; }\n@media (max-width: 520px) { .opts.opts-row { grid-template-columns: 1fr; } }\n\n.opt {\n  display: flex; align-items: center; gap: 14px;\n  padding: 14px 18px;\n  background: #F1F5ED;\n  border: 1.5px solid #DCE5D3;\n  border-radius: var(--radius);\n  cursor: pointer;\n  transition: border-color var(--t-fast), background var(--t-fast), transform var(--t-fast);\n  text-align: left;\n  font-size: 15px;\n  color: var(--ink);\n  width: 100%;\n}\n.opt:hover { border-color: #BFD0B3; background: #EAF0E3; }\n.opt:active { transform: scale(0.995); }\n.opt .radio {\n  width: 18px; height: 18px; border-radius: 50%;\n  border: 1.5px solid var(--hairline-strong);\n  display: grid; place-items: center;\n  flex-shrink: 0;\n  transition: all var(--t-fast);\n}\n.opt .radio::after {\n  content: ''; width: 8px; height: 8px; border-radius: 50%;\n  background: var(--accent); transform: scale(0);\n  transition: transform var(--t-fast);\n}\n.opt.selected {\n  border-color: var(--accent);\n  background: var(--accent-soft);\n}\n.opt.selected .radio { border-color: var(--accent); }\n.opt.selected .radio::after { transform: scale(1); }\n.opt-desc {\n  display: block; font-size: 13px; color: var(--ink-3); margin-top: 2px;\n}\n.opt-content { flex: 1; }\n\n/* Checkbox variant */\n.opt.check .radio { border-radius: 5px; }\n.opt.check .radio::after { border-radius: 2px; background: var(--accent); }\n\n/* Input fields */\n.field {\n  position: relative;\n  display: flex; align-items: stretch;\n  border: 1.5px solid #DCE5D3;\n  border-radius: var(--radius);\n  background: #F1F5ED;\n  transition: border-color var(--t-fast), box-shadow var(--t-fast);\n}\n.field:focus-within {\n  border-color: var(--accent);\n  box-shadow: 0 0 0 4px var(--accent-soft);\n}\n.field input, .field select {\n  flex: 1;\n  padding: 16px 18px;\n  border: 0; outline: 0;\n  background: transparent;\n  font-size: 17px;\n  font-weight: 500;\n  color: var(--ink);\n  letter-spacing: -0.005em;\n  border-radius: var(--radius);\n  width: 100%;\n  min-width: 0;\n  appearance: none;\n}\n.field input::placeholder { color: var(--ink-4); font-weight: 400; }\n.field .prefix, .field .suffix {\n  display: flex; align-items: center;\n  padding: 0 16px;\n  color: var(--ink-3);\n  font-size: 15px;\n  font-weight: 400;\n  background: transparent;\n  user-select: none;\n}\n.field .prefix { border-right: 1px solid var(--hairline); }\n.field .suffix { border-left: 1px solid var(--hairline); }\n.field.valid .suffix-valid {\n  color: var(--accent);\n}\n\n.field.error { border-color: var(--error); }\n.field.error:focus-within { box-shadow: 0 0 0 4px rgba(168,58,46,0.12); }\n\n.err-msg {\n  font-size: 13px; color: var(--error);\n  margin-top: 6px;\n  display: flex; align-items: center; gap: 6px;\n}\n\n/* Select with chevron */\n.select-wrap { position: relative; }\n.select-wrap::after {\n  content: '';\n  position: absolute; right: 20px; top: 50%;\n  width: 8px; height: 8px;\n  border-right: 1.5px solid var(--ink-3);\n  border-bottom: 1.5px solid var(--ink-3);\n  transform: translateY(-75%) rotate(45deg);\n  pointer-events: none;\n}\n\n/* Warning callout */\n.callout {\n  display: flex; gap: 12px;\n  padding: 14px 16px;\n  border-radius: var(--radius);\n  font-size: 14px;\n  line-height: 1.5;\n  margin-top: 10px;\n}\n.callout.warn { background: var(--warn-soft); color: var(--warn); }\n.callout.info { background: var(--accent-soft); color: var(--accent-ink); }\n.callout.sun  { background: var(--sun-soft); color: #6A4B10; }\n.callout svg { flex-shrink: 0; margin-top: 1px; }\n\n/* =====================  BUTTONS  ===================== */\n\n.btn-row {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 12px; margin-top: 32px;\n  flex-wrap: wrap;\n}\n\n.btn {\n  display: inline-flex; align-items: center; justify-content: center;\n  gap: 10px;\n  padding: 16px 28px;\n  border-radius: 999px;\n  font-size: 15px; font-weight: 500;\n  letter-spacing: -0.005em;\n  transition: transform var(--t-fast), background var(--t-fast), color var(--t-fast), box-shadow var(--t-fast);\n  min-height: 52px;\n  white-space: nowrap;\n}\n.btn-primary {\n  background: var(--accent);\n  color: white;\n  box-shadow: 0 1px 0 rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.12);\n}\n.btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 8px 18px -6px rgba(46,107,70,0.4); }\n.btn-primary:active:not(:disabled) { transform: translateY(0); }\n.btn-primary:disabled {\n  background: var(--bg-sand); color: var(--ink-4);\n  cursor: not-allowed; box-shadow: none;\n}\n.btn-ghost {\n  background: transparent;\n  color: var(--ink-2);\n  padding: 14px 20px;\n}\n.btn-ghost:hover { color: var(--ink); background: var(--bg-soft); }\n\n.btn-large {\n  padding: 20px 36px; font-size: 16px; min-height: 60px;\n}\n\n.btn svg { transition: transform var(--t-fast); }\n.btn-primary:hover svg { transform: translateX(3px); }\n\n/* =====================  RESULTS  ===================== */\n\n.hero-result {\n  text-align: center;\n  padding: 48px 20px 24px;\n  position: relative;\n}\n.hero-result .eyebrow { margin-bottom: 32px; }\n.hero-result .amount {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: clamp(64px, 9vw, 104px);\n  line-height: 1;\n  letter-spacing: -0.035em;\n  color: var(--ink);\n  margin: 0 0 10px;\n  font-feature-settings: \"ss01\", \"lnum\", \"tnum\";\n  display: inline-flex;\n  align-items: baseline;\n  gap: 0.02em;\n}\n.hero-result .amount .euro {\n  font-size: 0.6em;\n  color: var(--ink-3);\n  font-weight: 300;\n  letter-spacing: -0.02em;\n  margin-right: 0.08em;\n  /* optische correctie: iets naar boven zodat de horizontale strepen van € op x-hoogte landen */\n  transform: translateY(-0.05em);\n  display: inline-block;\n}\n.hero-result .amount .cent {\n  font-size: 0.55em; color: var(--ink-3); letter-spacing: 0;\n  vertical-align: 0.3em;\n  margin-left: 0.02em;\n}\n.hero-result .unit {\n  font-size: 11.5px; color: var(--ink-4);\n  letter-spacing: 0.18em; text-transform: uppercase;\n  margin-bottom: 28px;\n  font-weight: 500;\n}\n.hero-result .over-time {\n  display: inline-flex; gap: 10px; align-items: center;\n  padding: 9px 18px;\n  background: var(--accent-soft);\n  color: var(--accent-ink);\n  border-radius: 999px;\n  font-size: 13.5px; font-weight: 500;\n  margin-top: 0;\n  letter-spacing: 0.005em;\n}\n.hero-result .over-time svg { opacity: 0.7; }\n.hero-sub {\n  margin-top: 26px;\n  color: var(--ink-3);\n  font-size: 14.5px; line-height: 1.6;\n  max-width: 42ch;\n  margin-inline: auto;\n  letter-spacing: 0.005em;\n}\n\n/* Energy flow chart */\n.flow-card {\n  margin-top: 36px;\n  padding: 28px;\n  background: var(--bg-raised);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius-lg);\n}\n.flow-head {\n  display: flex; justify-content: space-between; align-items: baseline;\n  margin-bottom: 18px;\n}\n.flow-head h3 {\n  font-family: var(--display); font-size: 22px; font-weight: 400; margin: 0;\n  letter-spacing: -0.01em;\n}\n.flow-head .switcher {\n  display: inline-flex; gap: 2px; padding: 3px;\n  background: var(--bg-soft); border-radius: 999px;\n  font-size: 12.5px;\n}\n.flow-head .switcher button {\n  padding: 6px 12px; border-radius: 999px;\n  color: var(--ink-3); font-weight: 500; letter-spacing: -0.005em;\n}\n.flow-head .switcher button.on { background: var(--bg-raised); color: var(--ink); box-shadow: var(--shadow-sm); }\n\n.flow-bars { display: grid; gap: 14px; }\n.flow-bar {\n  display: grid; grid-template-columns: 140px 1fr auto;\n  align-items: center; gap: 14px;\n  font-size: 13.5px;\n}\n.flow-bar .lbl { color: var(--ink-2); font-weight: 500; }\n.flow-bar .track {\n  position: relative;\n  height: 32px;\n  background: var(--bg-soft);\n  border-radius: 6px;\n  overflow: hidden;\n}\n.flow-bar .seg {\n  position: absolute; top: 0; bottom: 0; left: 0;\n  border-right: 1.5px solid var(--bg-raised);\n  display: flex; align-items: center; padding: 0 8px;\n  font-size: 11.5px; color: white; font-weight: 500;\n  white-space: nowrap; overflow: hidden;\n  transition: width 900ms cubic-bezier(.2,.7,.3,1);\n}\n.flow-bar .seg.a { background: #3F8F5E; }\n.flow-bar .seg.b { background: #7FB195; }\n.flow-bar .seg.c { background: var(--sun); color: #3A2B0A; }\n.flow-bar .seg.d { background: #C9B88A; color: #3A2B0A; }\n.flow-bar .val { font-variant-numeric: tabular-nums; color: var(--ink-3); font-size: 13px; }\n\n.flow-legend {\n  display: flex; flex-wrap: wrap; gap: 14px 18px;\n  margin-top: 18px;\n  padding-top: 16px;\n  border-top: 1px solid var(--hairline);\n  font-size: 12.5px; color: var(--ink-3);\n}\n.flow-legend span {\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.flow-legend .dot {\n  width: 10px; height: 10px; border-radius: 3px; display: inline-block;\n}\n.flow-legend .dot.a { background: #3F8F5E; }\n.flow-legend .dot.b { background: #7FB195; }\n.flow-legend .dot.c { background: var(--sun); }\n.flow-legend .dot.d { background: #C9B88A; }\n\n@media (max-width: 560px) {\n  .flow-bar { grid-template-columns: 100px 1fr; }\n  .flow-bar .val { grid-column: 2; justify-self: end; font-size: 12px; }\n}\n\n/* Products */\n.products-head {\n  margin-top: 48px; margin-bottom: 14px;\n}\n.products-head h3 {\n  font-family: var(--display); font-size: 26px; font-weight: 400;\n  margin: 0 0 6px; letter-spacing: -0.01em;\n}\n.products-head p {\n  margin: 0; color: var(--ink-3); font-size: 15px;\n}\n\n.products {\n  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\n  margin-bottom: 18px;\n}\n@media (max-width: 640px) { .products { grid-template-columns: 1fr; } }\n.product {\n  background: var(--bg-raised);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius-lg);\n  overflow: hidden;\n  display: flex; flex-direction: column;\n}\n.product-img {\n  aspect-ratio: 4/3;\n  background: linear-gradient(180deg, #EAF1E5 0%, #CFE0C8 100%);\n  display: grid; place-items: center;\n  padding: 14px;\n}\n.product-img img {\n  height: 100%; max-height: 220px;\n  width: auto; object-fit: contain;\n  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));\n}\n.product-body {\n  padding: 20px 22px 22px;\n  display: flex; flex-direction: column; gap: 4px;\n}\n.product-brand {\n  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--ink-4); font-weight: 500;\n}\n.product-name {\n  font-family: var(--display); font-weight: 400;\n  font-size: 22px; letter-spacing: -0.01em;\n  line-height: 1.15;\n  margin: 2px 0 6px;\n}\n.product-kwh {\n  font-size: 14px; color: var(--ink-2);\n}\n.product-kwh strong { font-weight: 500; color: var(--ink); }\n.product-inverter {\n  font-size: 13px; color: var(--ink-3); margin-top: 4px;\n}\n.product-details {\n  margin-top: 16px;\n}\n.product-details summary {\n  list-style: none; cursor: pointer;\n  font-size: 13px; color: var(--accent);\n  font-weight: 500;\n  display: inline-flex; align-items: center; gap: 6px;\n  user-select: none;\n}\n.product-details summary::-webkit-details-marker { display: none; }\n.product-details summary::after {\n  content: '›'; font-size: 18px; line-height: 1;\n  transform: rotate(90deg);\n  transition: transform var(--t-fast);\n  display: inline-block;\n}\n.product-details[open] summary::after { transform: rotate(-90deg); }\n.product-details ul {\n  list-style: none; padding: 0; margin: 14px 0 0;\n  display: grid; gap: 8px;\n  font-size: 13.5px; color: var(--ink-2);\n  border-top: 1px solid var(--hairline);\n  padding-top: 14px;\n}\n.product-details ul li {\n  display: flex; gap: 10px; align-items: flex-start;\n}\n.product-details ul li::before {\n  content: ''; width: 5px; height: 5px;\n  background: var(--accent);\n  border-radius: 50%;\n  flex-shrink: 0;\n  margin-top: 8px;\n}\n\n.products-note {\n  font-size: 13.5px; color: #2C4A2A;\n  padding: 14px 16px;\n  background: #F1F5ED;\n  border: 1px solid #DCE5D3;\n  border-radius: var(--radius);\n  display: flex; align-items: flex-start; gap: 10px;\n}\n.products-note svg { flex-shrink: 0; margin-top: 2px; color: #5B7A4F; }\n\n/* Accordion */\n.accordion {\n  margin-top: 48px;\n  border-top: 1px solid var(--hairline);\n}\n.acc-head {\n  margin-bottom: 6px;\n}\n.acc-head h3 {\n  font-family: var(--display); font-weight: 400;\n  font-size: 26px; margin: 24px 0 18px; letter-spacing: -0.01em;\n}\n.acc-item {\n  border-bottom: 1px solid var(--hairline);\n}\n.acc-item summary {\n  list-style: none;\n  cursor: pointer;\n  padding: 22px 0;\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 16px;\n  font-size: 17px; font-weight: 500;\n  color: var(--ink);\n  letter-spacing: -0.005em;\n  transition: color var(--t-fast);\n}\n.acc-item summary:hover { color: var(--accent); }\n.acc-item summary::-webkit-details-marker { display: none; }\n.acc-item summary::after {\n  content: '';\n  width: 14px; height: 14px;\n  border-right: 1.5px solid currentColor;\n  border-bottom: 1.5px solid currentColor;\n  transform: rotate(45deg);\n  transition: transform var(--t);\n  flex-shrink: 0;\n  margin-top: -4px;\n}\n.acc-item[open] summary::after { transform: rotate(-135deg); margin-top: 4px; }\n.acc-body {\n  padding: 4px 0 28px;\n  color: var(--ink-2);\n  font-size: 15px;\n  line-height: 1.6;\n  max-width: 62ch;\n}\n.acc-body p { margin: 0 0 12px; }\n.acc-body p:last-child { margin-bottom: 0; }\n.acc-body strong { color: var(--ink); font-weight: 500; }\n\n.acc-rows {\n  display: grid; gap: 10px;\n  margin: 16px 0;\n  padding: 18px 20px;\n  background: var(--bg-soft);\n  border-radius: var(--radius);\n  font-size: 14px;\n}\n.acc-rows .row {\n  display: flex; justify-content: space-between; gap: 16px;\n  font-variant-numeric: tabular-nums;\n}\n.acc-rows .row.total {\n  padding-top: 10px;\n  border-top: 1px solid var(--hairline-strong);\n  font-weight: 500;\n}\n.acc-rows .row .k { color: var(--ink-3); display: flex; flex-direction: column; gap: 3px; }\n.acc-rows .row .k .k-sub {\n  font-size: 12px;\n  color: var(--ink-4);\n  font-variant-numeric: tabular-nums;\n  letter-spacing: 0.005em;\n}\n.acc-rows .row .v { color: var(--ink); font-weight: 500; white-space: nowrap; }\n.acc-rows .row.total.savings {\n  border-top: 1.5px solid var(--accent);\n  color: var(--accent-ink);\n}\n.acc-rows .row.total.savings .k,\n.acc-rows .row.total.savings .v {\n  color: var(--accent-ink);\n  font-weight: 600;\n}\n\n/* Explainer — step-by-step narrative in \"Hoe komen jullie aan deze besparing?\" */\n.explainer, .explainer-result {\n  display: grid; gap: 14px;\n  margin: 18px 0 10px;\n}\n.explainer-result {\n  margin-top: 8px;\n  padding: 16px 18px;\n  background: var(--accent-soft);\n  border-radius: 14px;\n  border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);\n}\n.explainer-row {\n  display: grid;\n  grid-template-columns: 28px 1fr;\n  gap: 14px;\n  align-items: start;\n}\n.explainer-row > div > strong {\n  display: block;\n  color: var(--ink);\n  font-weight: 500;\n  margin-bottom: 4px;\n  font-size: 15px;\n  letter-spacing: -0.005em;\n}\n.explainer-row > div > p {\n  margin: 0;\n  font-size: 14px;\n  line-height: 1.6;\n  color: var(--ink-2);\n}\n.explainer-step {\n  display: grid; place-items: center;\n  width: 26px; height: 26px;\n  border-radius: 50%;\n  background: var(--bg-sand);\n  color: var(--ink-2);\n  font-size: 13px; font-weight: 500;\n  font-variant-numeric: tabular-nums;\n  line-height: 1;\n  margin-top: 2px;\n}\n.explainer-step.green {\n  background: var(--accent);\n  color: white;\n  font-size: 14px;\n}\n.inline-hl {\n  background: linear-gradient(transparent 60%, color-mix(in srgb, var(--accent) 18%, transparent) 60%);\n  padding: 0 2px;\n}\n.acc-sub {\n  margin: 20px 0 8px !important;\n  color: var(--ink-2);\n  font-size: 14px;\n}\n.acc-disclaimer {\n  font-size: 12.5px !important;\n  color: var(--ink-4) !important;\n  margin-top: 16px !important;\n  line-height: 1.5;\n}\n.acc-rows .row .k .k-sub::before { content: ''; }\n\n/* CTA block */\n.cta {\n  margin-top: 56px;\n  padding: 48px 32px 44px;\n  background: linear-gradient(160deg, #1B3E28 0%, #102418 100%);\n  color: white;\n  border-radius: var(--radius-xl);\n  text-align: center;\n  position: relative;\n  overflow: hidden;\n  box-shadow:\n    0 20px 50px -24px rgba(46, 107, 70, 0.55),\n    0 0 0 1px rgba(46, 107, 70, 0.28);\n}\n.cta::before {\n  content: '';\n  position: absolute; inset: auto -25% -70% -25%;\n  height: 520px;\n  background: radial-gradient(ellipse 50% 60% at 50% 100%, rgba(120, 200, 140, 0.55) 0%, rgba(46, 107, 70, 0.25) 40%, transparent 70%);\n  pointer-events: none;\n}\n.cta::after {\n  content: '';\n  position: absolute; inset: auto auto -20% 50%;\n  transform: translateX(-50%);\n  width: 70%; height: 180px;\n  background: radial-gradient(ellipse, rgba(180, 230, 190, 0.35) 0%, transparent 65%);\n  filter: blur(20px);\n  pointer-events: none;\n}\n.cta > * { position: relative; z-index: 1; }\n.cta .eyebrow {\n  background: rgba(255,255,255,0.12);\n  color: rgba(255,255,255,0.88);\n  border-color: rgba(255,255,255,0.06);\n}\n.cta h3 {\n  font-family: var(--display); font-weight: 400;\n  font-size: clamp(28px, 4vw, 36px);\n  margin: 12px 0 10px; color: white;\n  letter-spacing: -0.015em;\n}\n.cta p {\n  color: rgba(255,255,255,0.72);\n  margin: 0 auto 28px;\n  max-width: 44ch;\n  font-size: 15px; line-height: 1.55;\n}\n.cta .btn-primary {\n  background: white; color: var(--ink);\n}\n.cta .btn-primary:hover { background: var(--bg); color: var(--ink); box-shadow: 0 10px 24px -8px rgba(0,0,0,0.4); }\n\n/* Disclaimer */\n.disclaimer {\n  margin-top: 32px;\n  font-size: 12.5px;\n  color: var(--ink-4);\n  line-height: 1.55;\n  padding: 0 4px;\n}\n.disclaimer a { color: var(--ink-3); text-decoration: underline; text-underline-offset: 3px; }\n\n/* =====================  CALC ANIMATION  ===================== */\n\n.calc-anim {\n  padding: 80px 0 40px;\n  text-align: center;\n}\n.calc-anim h2 {\n  font-family: var(--display); font-weight: 400;\n  font-size: clamp(28px, 4.5vw, 40px);\n  margin: 0 0 36px;\n  letter-spacing: -0.015em;\n}\n.calc-steps {\n  display: grid; gap: 12px;\n  max-width: 420px; margin: 0 auto 32px;\n  text-align: left;\n}\n.calc-step {\n  display: flex; align-items: center; gap: 14px;\n  padding: 14px 18px;\n  background: var(--bg-raised);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n  font-size: 15px;\n  opacity: 0; transform: translateY(8px);\n  transition: all var(--t-slow);\n}\n.calc-step.on { opacity: 1; transform: translateY(0); }\n.calc-step .num {\n  width: 28px; height: 28px; border-radius: 50%;\n  background: var(--bg-soft);\n  display: grid; place-items: center;\n  color: var(--ink-3); font-size: 13px; font-weight: 500;\n  flex-shrink: 0;\n  transition: all var(--t);\n}\n.calc-step.on .num { background: var(--accent-soft); color: var(--accent-ink); }\n.calc-step.done .num { background: var(--accent); color: white; }\n.calc-step .num::after {\n  content: attr(data-n);\n}\n.calc-step.done .num::after {\n  content: '';\n  width: 10px; height: 6px;\n  border-left: 1.5px solid white; border-bottom: 1.5px solid white;\n  transform: rotate(-45deg);\n  display: block;\n  margin-top: -3px;\n}\n.calc-step .text { flex: 1; color: var(--ink-2); font-weight: 500; }\n.calc-step.done .text { color: var(--ink); }\n\n.calc-bar {\n  max-width: 420px; margin: 0 auto;\n  height: 3px; border-radius: 999px;\n  background: var(--bg-sand); overflow: hidden;\n}\n.calc-bar > div {\n  height: 100%; width: 0;\n  background: var(--accent);\n  transition: width 2.5s linear;\n}\n.calc-note {\n  font-size: 13px; color: var(--ink-4); margin-top: 14px;\n}\n\n/* =====================  TIMESLOTS  ===================== */\n\n.slots { display: grid; gap: 10px; margin-top: 24px; }\n.slot {\n  display: flex; align-items: center; justify-content: space-between; gap: 14px;\n  padding: 20px 24px;\n  background: var(--bg-raised);\n  border: 1.5px solid var(--hairline);\n  border-radius: var(--radius);\n  text-align: left;\n  transition: all var(--t-fast);\n}\n.slot:hover { border-color: var(--accent); background: #fff; }\n.slot .when {\n  font-size: 17px; font-weight: 500;\n  letter-spacing: -0.005em;\n  margin-bottom: 2px;\n}\n.slot .relative {\n  font-size: 13px; color: var(--ink-3);\n}\n.slot .arrow { color: var(--ink-4); transition: transform var(--t-fast); }\n.slot:hover .arrow { transform: translateX(4px); color: var(--accent); }\n\n.slot-other {\n  margin-top: 8px;\n  padding: 16px; text-align: center;\n  font-size: 14px; color: var(--ink-3);\n  background: transparent;\n  border-radius: var(--radius);\n}\n.slot-other:hover { background: var(--bg-soft); color: var(--ink-2); }\n\n/* =====================  FORM  ===================== */\n\n.form-grid {\n  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\n  margin-top: 20px;\n}\n.form-grid .full { grid-column: 1 / -1; }\n@media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }\n\n.form-group label {\n  display: block;\n  font-size: 13px; color: var(--ink-3);\n  margin-bottom: 6px;\n  font-weight: 500;\n  letter-spacing: 0.01em;\n}\n.form-group label .req { color: var(--warn); }\n\ntextarea.field-input {\n  width: 100%;\n  padding: 14px 18px;\n  border: 1.5px solid var(--hairline);\n  border-radius: var(--radius);\n  background: var(--bg-raised);\n  font-size: 15px;\n  resize: vertical;\n  min-height: 90px;\n  font-family: inherit;\n  color: var(--ink);\n}\ntextarea.field-input:focus {\n  outline: 0; border-color: var(--accent);\n  box-shadow: 0 0 0 4px var(--accent-soft);\n}\n\n.consent {\n  display: flex; align-items: flex-start; gap: 10px;\n  margin-top: 20px;\n  padding: 14px 16px;\n  background: var(--bg-soft);\n  border-radius: var(--radius);\n  font-size: 13.5px; line-height: 1.5;\n  color: var(--ink-2);\n  cursor: pointer;\n}\n.consent input { margin-top: 2px; accent-color: var(--accent); width: 18px; height: 18px; }\n.consent a { color: var(--accent); }\n\n/* Appointment summary card on lead form */\n.appt-summary {\n  padding: 18px 20px;\n  background: var(--accent-soft);\n  border-radius: var(--radius);\n  color: var(--accent-ink);\n  font-size: 14px;\n  display: flex; align-items: center; gap: 14px;\n  margin-bottom: 24px;\n}\n.appt-summary svg { flex-shrink: 0; }\n.appt-summary strong { font-weight: 500; }\n\n/* Confirmation */\n.confirm {\n  text-align: center;\n  padding: 40px 20px 40px;\n}\n.confirm-mark {\n  width: 76px; height: 76px; border-radius: 50%;\n  background: var(--accent);\n  display: grid; place-items: center;\n  margin: 0 auto 24px;\n  color: white;\n  animation: pop 500ms cubic-bezier(.2,1.4,.3,1) both;\n}\n@keyframes pop {\n  0% { transform: scale(0); }\n  60% { transform: scale(1.1); }\n  100% { transform: scale(1); }\n}\n.confirm h2 {\n  font-family: var(--display); font-weight: 400;\n  font-size: clamp(30px, 5vw, 44px);\n  letter-spacing: -0.015em;\n  margin: 0 0 12px;\n}\n.confirm-detail {\n  font-size: 16px; color: var(--ink-2);\n  margin: 6px 0;\n}\n.confirm-detail strong { font-weight: 500; color: var(--ink); }\n.confirm-detail-box {\n  max-width: 460px; margin: 24px auto 0;\n  padding: 24px;\n  background: var(--bg-raised);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius-lg);\n  text-align: left;\n}\n.confirm-detail-box .row {\n  display: flex; justify-content: space-between; gap: 16px;\n  padding: 10px 0;\n  font-size: 14px;\n}\n.confirm-detail-box .row + .row { border-top: 1px solid var(--hairline); }\n.confirm-detail-box .k { color: var(--ink-3); }\n.confirm-detail-box .v { color: var(--ink); font-weight: 500; text-align: right; }\n\n/* =====================  TWEAKS PANEL  ===================== */\n\n.tweaks-fab {\n  position: fixed; bottom: 20px; right: 20px;\n  z-index: 100;\n  width: 46px; height: 46px; border-radius: 50%;\n  background: var(--ink); color: white;\n  display: none; place-items: center;\n  box-shadow: var(--shadow-lg);\n  transition: transform var(--t-fast);\n}\n.tweaks-fab:hover { transform: scale(1.05); }\n.tweaks-fab.visible { display: grid; }\n\n.tweaks-panel {\n  position: fixed; bottom: 78px; right: 20px;\n  z-index: 101;\n  width: 320px; max-width: calc(100vw - 40px);\n  background: var(--bg-raised);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius-lg);\n  box-shadow: var(--shadow-lg);\n  padding: 20px;\n  display: none;\n  max-height: 80vh;\n  overflow: auto;\n}\n.tweaks-panel.open { display: block; }\n.tweaks-panel h4 {\n  font-size: 14px; font-weight: 500;\n  margin: 0 0 16px;\n  display: flex; justify-content: space-between; align-items: center;\n  letter-spacing: -0.005em;\n}\n.tweaks-panel h4 button { font-size: 12px; color: var(--ink-3); }\n.tweak-group { margin-bottom: 18px; }\n.tweak-group:last-child { margin-bottom: 0; }\n.tweak-group label {\n  display: block; font-size: 12px; color: var(--ink-3); margin-bottom: 8px;\n  text-transform: uppercase; letter-spacing: 0.08em;\n}\n.swatches { display: flex; gap: 8px; flex-wrap: wrap; }\n.sw {\n  width: 32px; height: 32px; border-radius: 50%;\n  border: 2px solid transparent;\n  cursor: pointer;\n  transition: transform var(--t-fast), border-color var(--t-fast);\n  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);\n}\n.sw:hover { transform: scale(1.08); }\n.sw.on { border-color: var(--ink); }\n\n.tweak-pills { display: flex; gap: 6px; flex-wrap: wrap; }\n.tweak-pill {\n  padding: 8px 12px; border-radius: 999px;\n  font-size: 12.5px; font-weight: 500;\n  background: var(--bg-soft); color: var(--ink-2);\n  transition: all var(--t-fast);\n}\n.tweak-pill:hover { background: var(--bg-sand); }\n.tweak-pill.on { background: var(--accent); color: white; }\n\n/* =====================  WIZARD VARIANT: \"CONVERSATIONAL\"  ===================== */\n\nbody[data-wizard=\"conversational\"] .card {\n  background: transparent;\n  border: 0;\n  padding: 0;\n}\nbody[data-wizard=\"conversational\"] .q-label {\n  font-family: var(--display);\n  font-weight: 400;\n  font-size: clamp(22px, 3.5vw, 30px);\n  line-height: 1.2;\n  letter-spacing: -0.01em;\n  margin-bottom: 18px;\n}\n\n/* =====================  RESULT VARIANT: \"BIG AMOUNT\" minimal  ===================== */\n\nbody[data-result=\"minimal\"] .flow-card,\nbody[data-result=\"minimal\"] .acc-head h3 { /* keep */ }\n\nbody[data-result=\"dashboard\"] .hero-result {\n  padding: 24px 20px 8px;\n}\nbody[data-result=\"dashboard\"] .hero-result .amount {\n  font-size: clamp(52px, 9vw, 84px);\n}\nbody[data-result=\"dashboard\"] .flow-card {\n  margin-top: 20px;\n}\n\n/* =====================  DEV / SCENARIO TESTER  ===================== */\n\n.devbar {\n  position: fixed; top: 12px; left: 12px; z-index: 200;\n  display: none;\n}\n.devbar.open { display: block; }\n.devbar details {\n  background: var(--ink); color: white;\n  border-radius: 10px;\n  font-size: 12px;\n  padding: 6px 10px;\n  font-family: var(--mono);\n}\n.devbar summary { cursor: pointer; }\n.devbar pre { margin: 8px 0 0; white-space: pre-wrap; max-height: 50vh; overflow: auto; }\n\n/* =====================  UTIL  ===================== */\n\n.row-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }\n.hidden { display: none !important; }\n.mono { font-family: var(--mono); }\n.num-tab { font-variant-numeric: tabular-nums; }\n.sr { position: absolute; width: 1px; height: 1px; overflow: hidden; }\n\n/* =====================  BESPARING EXPLAINER (herschreven)  ===================== */\n\n.situation {\n  margin: 20px 0;\n  padding: 18px 20px 20px;\n  background: var(--bg-raised);\n  border: 1px solid var(--hairline);\n  border-radius: var(--radius);\n}\n.situation + .situation { margin-top: 16px; }\n.situation.sit-met {\n  background: var(--accent-soft);\n  border-color: color-mix(in srgb, var(--accent) 22%, transparent);\n}\n.sit-label {\n  font-size: 11px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  font-weight: 600;\n  margin-bottom: 4px;\n}\n.sit-met .sit-label { color: var(--accent-ink); }\n.sit-title {\n  font-family: var(--display, serif);\n  font-weight: 400;\n  font-size: 19px;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  margin-bottom: 14px;\n  line-height: 1.3;\n}\n.sit-intro {\n  font-size: 14px;\n  color: var(--ink-2);\n  margin: 0 0 14px;\n  line-height: 1.55;\n}\n.sit-intro strong { color: var(--ink); font-weight: 600; }\n\n.situation .explainer { gap: 12px; margin: 0; }\n.situation .explainer-row { grid-template-columns: 24px 1fr; gap: 12px; }\n.situation .explainer-step {\n  width: 22px; height: 22px;\n  background: var(--bg-soft);\n  font-size: 12px;\n}\n.sit-met .explainer-step {\n  background: color-mix(in srgb, var(--accent) 18%, white);\n  color: var(--accent-ink);\n}\n.situation .explainer-row > div > strong {\n  font-size: 14.5px;\n  margin-bottom: 2px;\n}\n.situation .explainer-row > div > p {\n  font-size: 13.5px;\n  color: var(--ink-3);\n  margin: 0 0 6px;\n}\n\n.calc-line {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  gap: 12px;\n  margin-top: 6px;\n  padding: 6px 10px;\n  background: var(--bg);\n  border-radius: 8px;\n  font-variant-numeric: tabular-nums;\n  font-size: 13px;\n  color: var(--ink-3);\n}\n.sit-met .calc-line {\n  background: color-mix(in srgb, var(--bg-raised) 65%, transparent);\n}\n.calc-val {\n  color: var(--ink);\n  font-weight: 500;\n  white-space: nowrap;\n}\n\n.sit-total {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  margin-top: 16px;\n  padding-top: 14px;\n  border-top: 1px dashed var(--hairline-strong);\n  font-size: 15px;\n  color: var(--ink-2);\n}\n.sit-total strong {\n  font-family: var(--display, serif);\n  font-weight: 400;\n  font-size: 22px;\n  color: var(--ink);\n  font-variant-numeric: tabular-nums;\n  letter-spacing: -0.01em;\n}\n.sit-met .sit-total { border-top-color: color-mix(in srgb, var(--accent) 30%, transparent); }\n.sit-met .sit-total strong { color: var(--accent-ink); }\n\n/* Samenvatting — aftrekstaatje */\n.savings-sum {\n  margin: 22px 0 8px;\n  padding: 18px 20px;\n  background: var(--ink);\n  color: white;\n  border-radius: var(--radius);\n}\n.savings-sum-row {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  padding: 8px 0;\n  font-size: 14.5px;\n  color: rgba(255,255,255,0.75);\n  font-variant-numeric: tabular-nums;\n}\n.savings-sum-row.minus { color: rgba(255,255,255,0.75); }\n.savings-sum-row.total {\n  border-top: 1px solid rgba(255,255,255,0.18);\n  padding-top: 14px;\n  margin-top: 4px;\n  color: white;\n  font-size: 16px;\n}\n.savings-sum-row.total strong {\n  font-family: var(--display, serif);\n  font-weight: 400;\n  font-size: 28px;\n  color: white;\n  letter-spacing: -0.01em;\n}\n\n/* Verberg oude explainer-result als die nog ergens rondzwerft */\n.explainer-result { display: none; }\n\n/* Flow-chart totalen (rood + groen onderaan) */\n.flow-totals {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 1px;\n  margin-top: 22px;\n  padding-top: 20px;\n  border-top: 1px solid var(--hairline);\n}\n@media (min-width: 640px) {\n  .flow-totals { grid-template-columns: 1fr 1fr; gap: 16px; }\n}\n.flow-total {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  padding: 14px 16px;\n  border-radius: 12px;\n  background: var(--bg);\n}\n.ft-label {\n  font-size: 12.5px;\n  color: var(--ink-3);\n  letter-spacing: 0.01em;\n  line-height: 1.35;\n}\n.ft-value {\n  font-family: var(--display, serif);\n  font-weight: 400;\n  font-size: 28px;\n  letter-spacing: -0.01em;\n  font-variant-numeric: tabular-nums;\n  line-height: 1;\n}\n.ft-unit {\n  font-size: 14px;\n  color: var(--ink-3);\n  font-family: var(--body, inherit);\n  font-weight: 400;\n  letter-spacing: 0;\n  margin-left: 2px;\n}\n.flow-total.ft-red {\n  background: color-mix(in srgb, #A83A2E 6%, var(--bg));\n}\n.flow-total.ft-red .ft-value {\n  color: #A83A2E;\n}\n.flow-total.ft-green {\n  background: var(--accent-soft);\n}\n.flow-total.ft-green .ft-value {\n  color: var(--accent-ink);\n}\n/* Form error melding */\n.form-error {\n  display: none;\n  padding: 12px 14px;\n  border-radius: 10px;\n  background: color-mix(in srgb, #A83A2E 8%, var(--bg));\n  border: 1px solid color-mix(in srgb, #A83A2E 25%, transparent);\n  color: #7A2A20;\n  font-size: 14px;\n  line-height: 1.45;\n  margin: 16px 0;\n}\n\n.flow-total.ft-green .ft-label {\n  color: var(--accent-ink);\n  opacity: 0.75;\n}\n\n/* =====================================================\n   RESPONSIVE — tablet + mobile\n   Break points:\n     ≤ 900  : tablet-ish (minor tuning)\n     ≤ 640  : tablet-portrait / large mobile\n     ≤ 480  : mobile\n     ≤ 380  : small mobile\n   ===================================================== */\n\n@media (max-width: 900px) {\n  .app { padding: 20px 20px 80px; }\n}\n\n@media (max-width: 640px) {\n  .app { padding: 16px 16px 80px; max-width: 100%; }\n  .topbar { padding: 4px 0; margin-bottom: 20px; }\n  .brand-logo { height: 24px; }\n  .progress { margin-bottom: 22px; }\n  .card { padding: 22px 18px; border-radius: 14px; }\n\n  h1.display { font-size: clamp(30px, 7vw, 42px); margin-bottom: 14px; }\n  h2.section-title { font-size: clamp(24px, 6vw, 32px); }\n  .lede { font-size: 15.5px; margin-bottom: 22px; }\n\n  .intro-benefits { margin: 22px 0 28px; gap: 10px; }\n  .intro-benefits li { padding: 14px 16px; gap: 12px; }\n  .intro-benefits li > div strong { font-size: 14.5px; }\n  .intro-benefits li > div span { font-size: 13.5px; }\n\n  .btn-large { padding: 16px 22px; font-size: 15px; }\n  .btn { padding: 12px 18px; font-size: 14.5px; }\n\n  /* Hero bedrag nog iets kleiner op mobiel */\n  .hero-result { padding: 28px 8px 18px; }\n  .hero-result .amount { font-size: clamp(54px, 14vw, 80px); }\n  .hero-result .eyebrow { margin-bottom: 20px; }\n\n  /* Flow bars al naar 2-col; krijgen nu meer ademruimte */\n  .flow-card { padding: 20px 18px; }\n  .flow-head { flex-direction: column; align-items: flex-start; gap: 10px; }\n  .flow-head .switcher { width: 100%; }\n  .flow-head .switcher button { flex: 1; }\n  .flow-bar .val { font-size: 12px; }\n\n  /* Accordion rijen: labels kunnen lang worden */\n  .acc-rows { padding: 14px; font-size: 13.5px; }\n  .acc-rows .row { gap: 10px; flex-wrap: wrap; }\n  .acc-rows .row .v { font-size: 14px; }\n\n  /* Situation/explainer */\n  .situation .explainer-row { gap: 10px; }\n\n  /* Appointment summary kaart */\n  .appt-summary { padding: 14px; flex-wrap: wrap; }\n\n  /* Bevestigings box */\n  .confirm-detail-box { padding: 18px 16px; }\n\n  /* CTA kaart (Klaar om te bespreken) */\n  .cta { padding: 28px 22px !important; }\n\n  /* Tweaks: panel pakt volle breedte min paar px */\n  .tweaks-panel {\n    width: calc(100vw - 24px);\n    right: 12px;\n    bottom: 70px;\n    padding: 16px;\n  }\n  .tweaks-fab {\n    right: 12px; bottom: 12px;\n  }\n}\n\n@media (max-width: 480px) {\n  .app { padding: 12px 12px 72px; }\n  .card { padding: 18px 14px; }\n  h1.display { font-size: 30px; line-height: 1.1; }\n  h2.section-title { font-size: 24px; }\n  .lede { font-size: 15px; }\n  .eyebrow { font-size: 11px; letter-spacing: 0.1em; padding: 3px 9px; }\n\n  .hero-result { padding: 22px 0 14px; }\n  .hero-result .amount { font-size: clamp(48px, 16vw, 68px); }\n  .hero-result .over-time { font-size: 12.5px; padding: 8px 14px; }\n\n  /* Flow-bars: verander naar label boven, balk onder */\n  .flow-bar { grid-template-columns: 1fr !important; gap: 6px; }\n  .flow-bar .lbl { font-size: 13px; }\n  .flow-bar .val { margin-top: -4px; }\n  .flow-legend { font-size: 12px; gap: 10px; flex-wrap: wrap; }\n\n  /* Accordion summary iets compacter */\n  details.acc-item summary { padding: 14px 14px; font-size: 14.5px; }\n\n  /* Rows in accordion: label boven, bedrag onder */\n  .acc-rows .row { flex-direction: column; gap: 4px; }\n  .acc-rows .row .v { text-align: left; }\n  .acc-rows .row.total { flex-direction: row; }\n\n  /* Producten: afbeelding iets kleiner */\n  .product-img { aspect-ratio: 5/4; }\n\n  /* Buttons volle breedte */\n  .start-btn, .cta .btn-primary {\n    width: 100%;\n    justify-content: center;\n  }\n\n  /* Flow totals: altijd in één kolom onder 480 */\n  .flow-totals { grid-template-columns: 1fr !important; gap: 10px !important; }\n  .ft-value { font-size: 24px; }\n}\n\n@media (max-width: 380px) {\n  h1.display { font-size: 26px; }\n  h2.section-title { font-size: 22px; }\n  .card { padding: 16px 12px; }\n  .hero-result .amount { font-size: 44px; }\n  .progress { font-size: 12px; gap: 8px; }\n}\n\n/* Tablet landscape finetune: wat meer ruimte in zij-padding, maar kaart blijft normaal */\n@media (min-width: 900px) and (max-width: 1100px) {\n  .app { max-width: 780px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"app\">\n\n  <!-- Top bar -->\n  <div class=\"topbar\">\n    <a class=\"brand\" href=\"https://sunns.nl\" target=\"_blank\" rel=\"noopener\" aria-label=\"Sunns\">\n      <img src=\"aac3a1fc-a8c1-45be-b4de-b6956e2b7567\" alt=\"Sunns\" class=\"brand-logo\">\n    <\u002Fa>\n  <\u002Fdiv>\n\n  <!-- Progress -->\n  <div class=\"progress\">\n    <span class=\"progress-label\">Stap 1 van 5<\u002Fspan>\n    <div class=\"progress-track\"><div class=\"progress-fill\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ SCREEN 1: INTRO ============ -->\n  <section class=\"screen active\" data-screen=\"intro\">\n    <div class=\"intro\">\n      <h1 class=\"display\">Slim opslaan.<br><em>Slim besparen.<\u002Fem><\u002Fh1>\n      <p class=\"lede\">Vanaf 1 januari 2027 verdwijnt de salderingsregeling. Ontdek wat dat voor jou betekent — en hoeveel je kunt besparen met een thuisbatterij.<\u002Fp>\n\n      <ul class=\"intro-benefits\">\n        <li>\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>\n          <div><strong>Persoonlijk advies op basis van jouw situatie<\u002Fstrong><span>We rekenen met jouw panelen, verbruik en contract.<\u002Fspan><\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>\n          <div><strong>Passende batterij van onze partners<\u002Fstrong><span>Alleen systemen die bij jouw woning horen.<\u002Fspan><\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>\n          <div><strong>Geen verplichtingen<\u002Fstrong><span>Je beslist zelf of je een gesprek wilt. Wij bellen alleen als jij dat wilt.<\u002Fspan><\u002Fdiv>\n        <\u002Fli>\n      <\u002Ful>\n\n      <div style=\"display:flex; flex-wrap:wrap; gap:12px; align-items:center;\">\n        <button class=\"btn btn-primary btn-large start-btn\">\n          Start de berekening\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 2: ZONNEPANELEN ============ -->\n  <section class=\"screen\" data-screen=\"s2\">\n    <span class=\"eyebrow\">Stap 1 · Jouw zonnepanelen<\u002Fspan>\n    <h2 class=\"section-title\">Hoeveel stroom wekken<br>je panelen op?<\u002Fh2>\n    <p class=\"lede\">We gebruiken dit om je zelfverbruik en overschot te berekenen.<\u002Fp>\n\n    <div class=\"card\">\n      <div class=\"q\">\n        <div class=\"opts\" data-opt=\"weet_opwek\">\n          <button class=\"opt\" data-val=\"true\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">Ik weet mijn jaaropwek<span class=\"opt-desc\">Vul het exacte aantal kWh per jaar in<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n          <button class=\"opt\" data-val=\"false\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">Ik weet dit niet, help me schatten<span class=\"opt-desc\">We schatten op basis van je installatie<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Branch: weet -->\n      <div class=\"q hidden\" data-sub=\"weet\">\n        <label class=\"q-label\">Jaaropwek<\u002Flabel>\n        <div class=\"field\">\n          <input type=\"number\" name=\"jaaropwek\" placeholder=\"bijv. 3500\" min=\"500\" max=\"25000\" inputmode=\"numeric\">\n          <span class=\"suffix\">kWh<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"err-msg hidden\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\"><\u002Fpath><\u002Fsvg>\n          Controleer je invoer — deze waarde lijkt aan de hoge of lage kant.\n        <\u002Fdiv>\n        <div class=\"q-hint\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n          Deze vind je op je jaarafrekening of in de app van je zonnepanelen.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Branch: schat -->\n      <div class=\"q hidden\" data-sub=\"schat\">\n        <label class=\"q-label\">Aantal zonnepanelen<\u002Flabel>\n        <div class=\"field\">\n          <input type=\"number\" name=\"aantal_panelen\" placeholder=\"bijv. 10\" min=\"1\" max=\"80\" inputmode=\"numeric\">\n          <span class=\"suffix\">panelen<\u002Fspan>\n        <\u002Fdiv>\n\n        <label class=\"q-label\" style=\"margin-top:18px;\">Wattpiek per paneel<\u002Flabel>\n        <div class=\"field\">\n          <input type=\"number\" name=\"wp\" value=\"430\" min=\"250\" max=\"550\" inputmode=\"numeric\">\n          <span class=\"suffix\">Wp<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"q-hint\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n          Meestal tussen 350 en 450 Wp. Bij twijfel: laat 430 staan.\n        <\u002Fdiv>\n\n        <label class=\"q-label\" style=\"margin-top:18px;\">Ligging van je panelen<\u002Flabel>\n        <div class=\"field select-wrap\">\n          <select name=\"ligging\">\n            <option value=\"\" disabled=\"\" selected=\"\">Kies ligging…<\u002Foption>\n            <option>Zuid<\u002Foption>\n            <option>Zuidoost<\u002Foption>\n            <option>Zuidwest<\u002Foption>\n            <option>Oost-West<\u002Foption>\n            <option>Oost<\u002Foption>\n            <option>West<\u002Foption>\n            <option>Noord<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div class=\"callout warn hidden\" data-warn=\"noord\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 3l10 18H2z\"><\u002Fpath><path d=\"M12 10v4M12 18h.01\"><\u002Fpath><\u002Fsvg>\n          <div>Panelen op noord presteren beduidend minder. De berekening houdt daar rekening mee.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"btn-row\">\n      <button class=\"btn btn-ghost btn-prev\">← Vorige<\u002Fbutton>\n      <button class=\"btn btn-primary btn-next\" disabled=\"\">\n        Volgende\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 3: STROOMVERBRUIK ============ -->\n  <section class=\"screen\" data-screen=\"s3\">\n    <span class=\"eyebrow\">Stap 2 · Jouw stroomverbruik<\u002Fspan>\n    <h2 class=\"section-title\">Hoeveel stroom<br>gebruik je per jaar?<\u002Fh2>\n    <p class=\"lede\">En wat past er bij jouw huishouden?<\u002Fp>\n\n    <div class=\"card\">\n      <div class=\"q\">\n        <label class=\"q-label\">Jaarverbruik<\u002Flabel>\n        <div class=\"field\">\n          <input type=\"number\" name=\"jaarverbruik\" placeholder=\"bijv. 2900\" min=\"500\" max=\"25000\" inputmode=\"numeric\">\n          <span class=\"suffix\">kWh per jaar<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"q-hint\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n          Dit vind je op je jaarafrekening. Een gemiddeld huishouden verbruikt 2.500 tot 3.500 kWh.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"q\">\n        <label class=\"q-label\">Wat past bij jouw situatie?<\u002Flabel>\n        <p class=\"q-sub\">Meerdere antwoorden mogelijk.<\u002Fp>\n        <div class=\"opts\">\n          <button class=\"opt check\" data-check=\"overdag_thuis\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">Ik ben overdag vaak thuis<\u002Fspan>\n          <\u002Fbutton>\n          <button class=\"opt check\" data-check=\"warmtepomp\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">Ik heb een warmtepomp<\u002Fspan>\n          <\u002Fbutton>\n          <button class=\"opt check\" data-check=\"ev_thuis_laden\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">Ik laad mijn elektrische auto thuis op<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"q hidden\" data-sub=\"ev\">\n        <label class=\"q-label\">Wanneer laad je meestal je auto?<\u002Flabel>\n        <div class=\"opts\">\n          <button class=\"opt\" data-ev-time=\"dag\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">Overdag <span class=\"opt-desc\">tijdens zonuren<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n          <button class=\"opt\" data-ev-time=\"nacht\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">'s Avonds of 's nachts<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"btn-row\">\n      <button class=\"btn btn-ghost btn-prev\">← Vorige<\u002Fbutton>\n      <button class=\"btn btn-primary btn-next\" disabled=\"\">Volgende <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 4: AANSLUITING ============ -->\n  <section class=\"screen\" data-screen=\"s4\">\n    <span class=\"eyebrow\">Stap 3 · Aansluiting &amp; contract<\u002Fspan>\n    <h2 class=\"section-title\">Hoe is je meterkast<br>en contract?<\u002Fh2>\n    <p class=\"lede\">Dit bepaalt welke omvormer en strategie het beste past.<\u002Fp>\n\n    <div class=\"card\">\n      <div class=\"q\">\n        <label class=\"q-label\">Wat voor meterkast heb je?<\u002Flabel>\n        <div class=\"opts\">\n          <button class=\"opt\" data-meterkast=\"1-fase\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">1-fase aansluiting<\u002Fspan><\u002Fbutton>\n          <button class=\"opt\" data-meterkast=\"3-fase\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">3-fase aansluiting<\u002Fspan><\u002Fbutton>\n          <button class=\"opt\" data-meterkast=\"weet-niet\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">Ik weet het niet<span class=\"opt-desc\">We gaan uit van 1-fase<\u002Fspan><\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"q-hint\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n          Bij 3-fase zie je in je meterkast meerdere groepen die elk met een eigen kabel verbonden zijn.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"q\">\n        <label class=\"q-label\">Wat voor energiecontract heb je?<\u002Flabel>\n        <div class=\"opts\">\n          <button class=\"opt\" data-contract=\"Vast\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">Vast contract<\u002Fspan><\u002Fbutton>\n          <button class=\"opt\" data-contract=\"Variabel\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">Variabel contract<\u002Fspan><\u002Fbutton>\n          <button class=\"opt\" data-contract=\"Dynamisch\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">Dynamisch contract<span class=\"opt-desc\">uurprijzen<\u002Fspan><\u002Fspan><\u002Fbutton>\n          <button class=\"opt\" data-contract=\"weet-niet\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">Ik weet het niet<span class=\"opt-desc\">We gaan uit van een vast contract<\u002Fspan><\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"callout info hidden\" data-sub=\"dyn-bonus\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 2l2.4 7.3H22l-6.1 4.4 2.3 7.3L12 16.5 5.8 21l2.3-7.3L2 9.3h7.6z\"><\u002Fpath><\u002Fsvg>\n          <div><strong>Mooie keuze.<\u002Fstrong> Met een dynamisch contract kun je extra verdienen met je batterij via prijsarbitrage.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"btn-row\">\n      <button class=\"btn btn-ghost btn-prev\">← Vorige<\u002Fbutton>\n      <button class=\"btn btn-primary btn-next\" disabled=\"\">Volgende <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 5: TARIEF ============ -->\n  <section class=\"screen\" data-screen=\"s5\">\n    <span class=\"eyebrow\">Stap 4 · Jouw tarief<\u002Fspan>\n    <h2 class=\"section-title\">Wat betaal je nu<br>per kWh?<\u002Fh2>\n    <p class=\"lede\">Weet je dit niet? Het landelijk gemiddelde is prima — de berekening blijft betrouwbaar.<\u002Fp>\n\n    <div class=\"card\">\n      <div class=\"q\">\n        <div class=\"opts\">\n          <button class=\"opt selected\" data-tarief=\"gemiddeld\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">Gebruik het landelijk gemiddelde<span class=\"opt-desc\">€ 0,27 per kWh all-in<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n          <button class=\"opt\" data-tarief=\"custom\" type=\"button\">\n            <span class=\"radio\"><\u002Fspan>\n            <span class=\"opt-content\">Ja, ik wil een precieze berekening<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"q hidden\" data-sub=\"custom\">\n        <label class=\"q-label\">Wat betaal je per kWh?<\u002Flabel>\n        <div class=\"field\">\n          <span class=\"prefix\">€<\u002Fspan>\n          <input type=\"text\" name=\"custom_tarief\" placeholder=\"0,27\" inputmode=\"decimal\">\n          <span class=\"suffix\">per kWh (all-in)<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"q-hint\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n          Dit staat op je energierekening. Gemiddeld is dit tussen € 0,25 en € 0,30.\n        <\u002Fdiv>\n\n        <label class=\"q-label\" style=\"margin-top:20px;\">Betaal je al terugleverkosten?<\u002Flabel>\n        <div class=\"opts\">\n          <button class=\"opt\" data-tk=\"ja\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">Ja<\u002Fspan><\u002Fbutton>\n          <button class=\"opt\" data-tk=\"nee\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">Nee<\u002Fspan><\u002Fbutton>\n          <button class=\"opt\" data-tk=\"weet-niet\" type=\"button\"><span class=\"radio\"><\u002Fspan><span class=\"opt-content\">Weet ik niet<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"q hidden\" data-sub=\"tk-amount\" style=\"margin-top:12px;\">\n          <label class=\"q-label\">Hoeveel per jaar?<\u002Flabel>\n          <div class=\"field\">\n            <span class=\"prefix\">€<\u002Fspan>\n            <input type=\"number\" name=\"tk_bedrag\" placeholder=\"0\" inputmode=\"numeric\">\n            <span class=\"suffix\">per jaar<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"btn-row\">\n      <button class=\"btn btn-ghost btn-prev\">← Vorige<\u002Fbutton>\n      <button class=\"btn btn-primary btn-next\">Bereken mijn besparing <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 6: CALC ANIMATION ============ -->\n  <section class=\"screen\" data-screen=\"anim\">\n    <div class=\"calc-anim\">\n      <h2>Even rekenen…<\u002Fh2>\n      <div class=\"calc-steps\">\n        <div class=\"calc-step\"><span class=\"num\" data-n=\"1\"><\u002Fspan><span class=\"text\">Analyseren van jouw zonne-opbrengst<\u002Fspan><\u002Fdiv>\n        <div class=\"calc-step\"><span class=\"num\" data-n=\"2\"><\u002Fspan><span class=\"text\">Berekenen van zelfverbruik<\u002Fspan><\u002Fdiv>\n        <div class=\"calc-step\"><span class=\"num\" data-n=\"3\"><\u002Fspan><span class=\"text\">Selecteren van passende thuisbatterij<\u002Fspan><\u002Fdiv>\n        <div class=\"calc-step\"><span class=\"num\" data-n=\"4\"><\u002Fspan><span class=\"text\">Berekenen van jaarlijkse besparing<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"calc-bar\"><div><\u002Fdiv><\u002Fdiv>\n      <p class=\"calc-note\">Nog een paar seconden…<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 7: RESULTAAT ============ -->\n  <section class=\"screen\" data-screen=\"result\">\n\n    <!-- Blok B: producten (eerst) -->\n    <div class=\"products-head\">\n      <h3>Passend voor jouw situatie<\u002Fh3>\n      <p>Wij adviseren een thuisbatterij van ongeveer <strong class=\"advies-kwh\">10 kWh<\u002Fstrong>. Uit ons assortiment passen deze twee systemen bij jou:<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"products\">\n      <article class=\"product\">\n        <div class=\"product-img\"><img src=\"9861a73f-86a3-4a56-a81e-b287d6fdfe4b\" alt=\"Dyness Tower\"><\u002Fdiv>\n        <div class=\"product-body\">\n          <span class=\"product-brand\">Dyness<\u002Fspan>\n          <h4 class=\"product-name dyness-name\">Dyness Tower T10<\u002Fh4>\n          <div class=\"product-kwh\"><strong class=\"dyness-kwh\">10,66 kWh<\u002Fstrong> capaciteit<\u002Fdiv>\n          <div class=\"product-inverter\">Met Solis <span class=\"solis-kw\">5<\u002Fspan> kW hybride omvormer<\u002Fdiv>\n          <details class=\"product-details\">\n            <summary>Meer details<\u002Fsummary>\n            <ul>\n              <li>LiFePO4 technologie<\u002Fli>\n              <li>6.000 cycli gegarandeerd<\u002Fli>\n              <li>IP54 beschermklasse (binnen én buiten)<\u002Fli>\n              <li>Geschikt voor eenfase en driefase<\u002Fli>\n              <li>10 jaar garantie<\u002Fli>\n            <\u002Ful>\n          <\u002Fdetails>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"product\">\n        <div class=\"product-img\"><img src=\"572450f1-8eab-4eb2-aa4f-3e931b4fcf84\" alt=\"AlphaESS SMILE G3\"><\u002Fdiv>\n        <div class=\"product-body\">\n          <span class=\"product-brand\">AlphaESS<\u002Fspan>\n          <h4 class=\"product-name\">SMILE G3<\u002Fh4>\n          <div class=\"product-kwh\"><strong class=\"alpha-kwh\">11,4 kWh<\u002Fstrong> (<span class=\"alpha-modules\">3<\u002Fspan> modules)<\u002Fdiv>\n          <div class=\"product-inverter\">Met <span class=\"alpha-inverter\">SMILE-G3-S5<\u002Fspan> omvormer<\u002Fdiv>\n          <details class=\"product-details\">\n            <summary>Meer details<\u002Fsummary>\n            <ul>\n              <li>LiFePO4 technologie<\u002Fli>\n              <li>Modulair uitbreidbaar (nu en later)<\u002Fli>\n              <li>Ingebouwde brandbeveiliging (aerosol)<\u002Fli>\n              <li>Geschikt voor eenfase en driefase<\u002Fli>\n              <li>Dynamische prijsarbitrage-klaar<\u002Fli>\n              <li>10 jaar systeemgarantie (Munich RE)<\u002Fli>\n            <\u002Ful>\n          <\u002Fdetails>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <div class=\"products-note\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n      <span class=\"advies-text\">Beide systemen zijn zeer geschikt voor jouw situatie. Tijdens het belgesprek bespreken we welke het beste bij je past.<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Blok A2: flow chart (onder producten) -->\n    <div class=\"flow-card\">\n      <div class=\"flow-head\">\n        <h3>Jouw energiestromen per jaar<\u002Fh3>\n        <div class=\"switcher\">\n          <button class=\"on\" data-flow=\"zonder\">Zonder batterij<\u002Fbutton>\n          <button data-flow=\"met\">Met batterij<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"flow-bars flow-zonder\">\n        <div class=\"flow-bar bar-opwek\">\n          <div class=\"lbl\">Opgewekt<\u002Fdiv>\n          <div class=\"track\">\n            <div class=\"seg a\"><\u002Fdiv>\n            <div class=\"seg c\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"val\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flow-bar bar-verbruik\">\n          <div class=\"lbl\">Verbruik<\u002Fdiv>\n          <div class=\"track\">\n            <div class=\"seg a\"><\u002Fdiv>\n            <div class=\"seg d\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"val\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"flow-bars flow-met hidden\">\n        <div class=\"flow-bar bar-met-verbruik\">\n          <div class=\"lbl\">Verbruik<\u002Fdiv>\n          <div class=\"track\">\n            <div class=\"seg a\"><\u002Fdiv>\n            <div class=\"seg b\"><\u002Fdiv>\n            <div class=\"seg d\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"val\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"flow-legend\">\n        <span><i class=\"dot a\"><\u002Fi>Direct zelfverbruik<\u002Fspan>\n        <span class=\"legend-bat hidden\"><i class=\"dot b\"><\u002Fi>Via batterij<\u002Fspan>\n        <span class=\"legend-teruglev\"><i class=\"dot c\"><\u002Fi>Teruggeleverd (aan net)<\u002Fspan>\n        <span><i class=\"dot d\"><\u002Fi>Ingekocht (van net)<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"flow-totals\">\n        <div class=\"flow-total ft-red\">\n          <span class=\"ft-label\">Nieuwe jaarrekening zonder batterij<\u002Fspan>\n          <span class=\"ft-value\">€ <span class=\"acc-netto-zonder\">0<\u002Fspan><span class=\"ft-unit\"> / jaar<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flow-total ft-green\">\n          <span class=\"ft-label\">Besparing met een thuisbatterij per jaar<\u002Fspan>\n          <span class=\"ft-value\">€ <span class=\"amount-value\">0<\u002Fspan><span class=\"ft-unit\"> / jaar<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout warn hoog-verbruik hidden\" style=\"margin-top:12px;\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 3l10 18H2z\"><\u002Fpath><path d=\"M12 10v4M12 18h.01\"><\u002Fpath><\u002Fsvg>\n      <div>Je hebt een hoog verbruik. We bekijken in het gesprek ook of een nog ruimer systeem loont.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Blok C: accordion -->\n    <div class=\"accordion\">\n      <div class=\"acc-head\"><h3>Meer weten?<\u002Fh3><\u002Fdiv>\n\n      <details class=\"acc-item\">\n        <summary>Hoe komen jullie aan deze besparing?<\u002Fsummary>\n        <div class=\"acc-body\">\n          <p>Vanaf 2027 verdwijnt de salderingsregeling. Vanaf dan maakt het uit <em>wanneer<\u002Fem> je je zonnestroom gebruikt. We vergelijken jouw <strong>energierekening<\u002Fstrong> in twee situaties:<\u002Fp>\n\n          <!-- Situatie A -->\n          <div class=\"situation sit-zonder\">\n            <div class=\"sit-label\">A · Zonder batterij<\u002Fdiv>\n            <div class=\"sit-title\">Wat je in 2027 betaalt voor energie<\u002Fdiv>\n\n            <div class=\"explainer\">\n              <div class=\"explainer-row\">\n                <span class=\"explainer-step\">1<\u002Fspan>\n                <div>\n                  <strong>Je koopt <span class=\"acc-ingekocht\">0<\u002Fspan> kWh in bij je leverancier<\u002Fstrong>\n                  <p>Dat is stroom die je 's ochtends, 's avonds en 's nachts van het net haalt. Tegen het normale tarief van <strong>€ 0,27<\u002Fstrong> per kWh.<\u002Fp>\n                  <div class=\"calc-line\">\n                    <span><span class=\"acc-ingekocht\">0<\u002Fspan> kWh × € 0,27<\u002Fspan>\n                    <span class=\"calc-val\">= € <span class=\"acc-kosten-inkoop\">0<\u002Fspan><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"explainer-row\">\n                <span class=\"explainer-step\">2<\u002Fspan>\n                <div>\n                  <strong>Je levert <span class=\"acc-teruggeleverd\">0<\u002Fspan> kWh terug aan het net<\u002Fstrong>\n                  <p>Dat is het overschot van je panelen dat je zelf niet meteen gebruikt. Daarvoor krijg je nog maar <strong>€ 0,05<\u002Fstrong> per kWh (was € 0,27 met saldering).<\u002Fp>\n                  <div class=\"calc-line\">\n                    <span><span class=\"acc-teruggeleverd\">0<\u002Fspan> kWh × € 0,05<\u002Fspan>\n                    <span class
