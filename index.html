=\"calc-val\">= − € <span class=\"acc-opbrengst\">0<\u002Fspan><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"explainer-row\">\n                <span class=\"explainer-step\">3<\u002Fspan>\n                <div>\n                  <strong>Plus terugleverkosten<\u002Fstrong>\n                  <p>Leveranciers rekenen een opslag voor klanten die veel terugleveren (≈ € 0,08 per kWh teruggeleverd).<\u002Fp>\n                  <div class=\"calc-line\">\n                    <span><span class=\"acc-teruggeleverd\">0<\u002Fspan> kWh × € 0,08<\u002Fspan>\n                    <span class=\"calc-val\">= € <span class=\"acc-kosten-tl\">0<\u002Fspan><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"sit-total\">\n              <span>Jouw jaarrekening zónder batterij<\u002Fspan>\n              <strong>€ <span class=\"acc-netto-zonder\">0<\u002Fspan> / jaar<\u002Fstrong>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Situatie B -->\n          <div class=\"situation sit-met\">\n            <div class=\"sit-label\">B · Mét batterij<\u002Fdiv>\n            <div class=\"sit-title\">Wat je betaalt met een batterij van <span class=\"acc-batt-kwh\">0<\u002Fspan> kWh<\u002Fdiv>\n\n            <p class=\"sit-intro\">De batterij vangt per jaar ongeveer <strong><span class=\"acc-batt-effectief\">0<\u002Fspan> kWh<\u002Fstrong> op die eerst naar het net ging. Die stroom gebruik je nu 's avonds zelf. Gevolg: je koopt minder in <em>en<\u002Fem> levert minder terug.<\u002Fp>\n\n            <div class=\"explainer\">\n              <div class=\"explainer-row\">\n                <span class=\"explainer-step\">1<\u002Fspan>\n                <div>\n                  <strong>Je koopt nog maar <span class=\"acc-nieuwe-inkoop\">0<\u002Fspan> kWh in<\u002Fstrong>\n                  <div class=\"calc-line\">\n                    <span><span class=\"acc-nieuwe-inkoop\">0<\u002Fspan> kWh × € 0,27<\u002Fspan>\n                    <span class=\"calc-val\">= € <span class=\"acc-kosten-inkoop-met\">0<\u002Fspan><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"explainer-row\">\n                <span class=\"explainer-step\">2<\u002Fspan>\n                <div>\n                  <strong>Je levert nog maar <span class=\"acc-nieuwe-teruglev\">0<\u002Fspan> kWh terug<\u002Fstrong>\n                  <div class=\"calc-line\">\n                    <span><span class=\"acc-nieuwe-teruglev\">0<\u002Fspan> kWh × € 0,05<\u002Fspan>\n                    <span class=\"calc-val\">= − € <span class=\"acc-opbrengst-met\">0<\u002Fspan><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"explainer-row\">\n                <span class=\"explainer-step\">3<\u002Fspan>\n                <div>\n                  <strong>Minder terugleverkosten<\u002Fstrong>\n                  <div class=\"calc-line\">\n                    <span><span class=\"acc-nieuwe-teruglev\">0<\u002Fspan> kWh × € 0,08<\u002Fspan>\n                    <span class=\"calc-val\">= € <span class=\"acc-kosten-tl-met\">0<\u002Fspan><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"sit-total sit-total-green\">\n              <span>Jouw jaarrekening mét batterij<\u002Fspan>\n              <strong>€ <span class=\"acc-netto-met\">0<\u002Fspan> / jaar<\u002Fstrong>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Samenvatting / aftrek -->\n          <div class=\"savings-sum\">\n            <div class=\"savings-sum-row\">\n              <span>Jaarrekening zónder batterij<\u002Fspan>\n              <span>€ <span class=\"acc-netto-zonder\">0<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"savings-sum-row minus\">\n              <span>− Jaarrekening mét batterij<\u002Fspan>\n              <span>€ <span class=\"acc-netto-met\">0<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"savings-sum-row total\">\n              <span>= Jouw jaarlijkse besparing<\u002Fspan>\n              <strong>€ <span class=\"acc-verschil\">0<\u002Fspan><\u002Fstrong>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <p class=\"acc-disclaimer\">Deze berekening is indicatief, gebaseerd op landelijke gemiddelden (€ 0,27 inkoop, € 0,05 teruglevering, € 0,08 terugleverkosten) en jouw ingevoerde gegevens. Werkelijke besparing hangt ook af van je verbruikspatroon en contract.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"acc-item\">\n        <summary>Wat verandert er vanaf 2027?<\u002Fsummary>\n        <div class=\"acc-body\">\n          <p>Tot en met 2026 geldt de salderingsregeling. Die zorgt dat alle stroom die je teruglevert wordt weggestreept tegen de stroom die je afneemt. Je betaalt per saldo alleen voor het verschil.<\u002Fp>\n          <p>Op 1 januari 2027 verdwijnt deze regeling definitief. Dit is vastgelegd in de wet — geen afbouw, geen uitstel.<\u002Fp>\n          <p>Na 2027 worden het twee aparte geldstromen:<\u002Fp>\n          <p><strong>Teruglevering<\u002Fstrong> → je krijgt hiervoor nog maar een kleine vergoeding (ongeveer € 0,05 per kWh).<br><strong>Inkoop 's avonds<\u002Fstrong> → je betaalt de normale prijs (ongeveer € 0,27 per kWh).<\u002Fp>\n          <p>Het verschil — ongeveer € 0,22 per kWh — is wat je mist voor elke kWh zonnestroom die naar het net gaat in plaats van in je batterij.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"acc-item\">\n        <summary>Wat doet de batterij precies?<\u002Fsummary>\n        <div class=\"acc-body\">\n          <p>Je zonnepanelen wekken de meeste stroom op rond het middaguur, wanneer je vaak niet thuis bent. Die stroom gaat nu ongebruikt naar het net.<\u002Fp>\n          <p>'s Avonds koop je diezelfde stroom terug — maar dan tegen een veel hogere prijs.<\u002Fp>\n          <p>Een thuisbatterij lost dit op: overdag slaat hij jouw overschot op, 's avonds gebruik je die stroom weer uit de batterij. Je hoeft dus minder in te kopen van het net.<\u002Fp>\n          <p>Concreet: jouw aanbevolen batterij vangt per jaar ongeveer <strong class=\"acc-batt-opgevangen\">0<\u002Fstrong> kWh op die je anders had moeten terugleveren en later weer inkopen.<\u002Fp>\n          <p class=\"dyn-arbitrage hidden\"><strong>Extra:<\u002Fstrong> met een dynamisch contract laadt de batterij ook automatisch bij lage stroomprijzen en ontlaadt bij pieken — zo verdien je extra met prijsarbitrage.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"acc-item\">\n        <summary>Waarom deze batterijmaat voor mij?<\u002Fsummary>\n        <div class=\"acc-body\">\n          <p>De optimale batterijmaat hangt af van:<\u002Fp>\n          <div class=\"acc-rows\">\n            <div class=\"row\"><span class=\"k\">Jouw zonnestroom-overschot<\u002Fspan><span class=\"v\"><span class=\"acc-surplus\">0<\u002Fspan> kWh / jaar<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><span class=\"k\">Jouw avondverbruik (van het net)<\u002Fspan><span class=\"v\">~<span class=\"acc-avond\">0<\u002Fspan> kWh / jaar<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><span class=\"k\">Jouw aansluiting<\u002Fspan><span class=\"v\"><span class=\"acc-meterkast\">1-fase<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <p>Een batterij die te klein is vangt niet alles op. Een die te groot is, zit altijd half leeg — die extra capaciteit verdien je nooit terug. Voor jouw profiel is <strong class=\"acc-batt-kwh\">0<\u002Fstrong> kWh de optimale maat.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"acc-item\">\n        <summary>Wat kost het — en hoe zit het met BTW-teruggave?<\u002Fsummary>\n        <div class=\"acc-body\">\n          <p>De exacte prijs hangt af van het systeem, de installatie en jouw situatie. Tijdens het belgesprek bespreken we dit concreet met je.<\u002Fp>\n          <p><strong>BTW-teruggave.<\u002Fstrong> Op beide systemen is mogelijk BTW-teruggave van toepassing. Voor veel huishoudens met zonnepanelen betekent dit dat je de 21% BTW terugkrijgt van de Belastingdienst.<\u002Fp>\n          <p>Controleer jouw situatie via <a href=\"https://de-centrale.nl\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--accent);\">de-centrale.nl<\u002Fa>. Wij helpen je graag met het aanvragen en papierwerk.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"acc-item\">\n        <summary>Wat zit er in de prijs inbegrepen?<\u002Fsummary>\n        <div class=\"acc-body\">\n          <p>Wat je bij Sunns krijgt:<\u002Fp>\n          <ul style=\"padding-left:0; list-style:none; display:grid; gap:6px;\">\n            <li>✓ Professionele installatie door gecertificeerde monteurs (InstallQ, NEN 3140, VCA)<\u002Fli>\n            <li>✓ Koppeling aan je bestaande zonnepaneleninstallatie<\u002Fli>\n            <li>✓ Hybride omvormer (al inbegrepen in ons advies)<\u002Fli>\n            <li>✓ Uitgebreide fabrieksgarantie<\u002Fli>\n            <li>✓ Monitoring via app<\u002Fli>\n            <li>✓ 15 jaar garantie op onze installatie<\u002Fli>\n            <li>✓ Lokale service en ondersteuning<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <!-- Blok D: CTA -->\n    <div class=\"cta\">\n      <span class=\"eyebrow\">Volgende stap<\u002Fspan>\n      <h3>Klaar om te bespreken?<\u002Fh3>\n      <p>We bellen je graag terug voor een persoonlijk adviesgesprek. Geen verplichtingen — gewoon even samen kijken wat bij je past.<\u002Fp>\n      <button class=\"btn btn-primary btn-large cta-plan-appt\">\n        Plan een terugbelafspraak\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <p class=\"disclaimer\">\n      Deze berekening is indicatief, gebaseerd op landelijke gemiddelden en jouw ingevoerde gegevens. Werkelijke besparing kan afwijken afhankelijk van je energiecontract, verbruikspatroon en gedrag. Neem contact met ons op voor een persoonlijk, precies advies. ·\n      <a href=\"https://cdn.prod.website-files.com/6967a86ae7d42af36788b8b2/6981f1a6be403e2f20047187_privacy%20verklaring%20Sunns.pdf\" target=\"_blank\">Privacyverklaring<\u002Fa> ·\n      <a href=\"https://cdn.prod.website-files.com/6967a86ae7d42af36788b8b2/6981ef63fa61d0eaae215acb_SUNNS%20AV.pdf\" target=\"_blank\">Algemene voorwaarden<\u002Fa>\n    <\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 8: TIJDSLOTEN ============ -->\n  <section class=\"screen\" data-screen=\"slots\">\n    <span class=\"eyebrow\">Terugbelafspraak<\u002Fspan>\n    <h2 class=\"section-title\">Wanneer schikt<br>het jou?<\u002Fh2>\n    <p class=\"lede\">Kies een moment dat jou past. We bellen precies dan — niet eerder, niet later.<\u002Fp>\n\n    <div class=\"slots\"><\u002Fdiv>\n\n    <button class=\"btn btn-ghost slot-other\" style=\"margin-top:16px;width:100%;\">Kies een ander moment →<\u002Fbutton>\n\n    <div class=\"btn-row\">\n      <button class=\"btn btn-ghost slots-back\">← Terug<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 9: LEAD FORM ============ -->\n  <section class=\"screen\" data-screen=\"form\">\n    <span class=\"eyebrow\">Bijna klaar<\u002Fspan>\n    <h2 class=\"section-title\">Laat je gegevens<br>even achter<\u002Fh2>\n    <p class=\"lede\">We bellen je op het gekozen moment, niet eerder.<\u002Fp>\n\n    <div class=\"appt-summary\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M8 3v4M16 3v4M3 11h18\"><\u002Fpath><\u002Fsvg>\n      <div><strong>Afspraak:<\u002Fstrong> <span class=\"appt-summary-time\">—<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\">\n      <form class=\"lead-form\">\n        <div class=\"form-grid\">\n          <div class=\"form-group\">\n            <label>Voornaam <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <div class=\"field\"><input type=\"text\" name=\"voornaam\" required=\"\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-group\">\n            <label>Achternaam <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <div class=\"field\"><input type=\"text\" name=\"achternaam\" required=\"\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-group full\">\n            <label>E-mailadres <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <div class=\"field\"><input type=\"email\" name=\"email\" required=\"\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-group full\">\n            <label>Telefoonnummer <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <div class=\"field\"><input type=\"tel\" name=\"telefoon\" placeholder=\"06 12345678\" required=\"\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"form-group full\">\n            <label>Opmerking of vraag (optioneel)<\u002Flabel>\n            <textarea class=\"field-input\" name=\"opmerking\" rows=\"3\" placeholder=\"Bijvoorbeeld: ik heb al een Solis omvormer.\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <label class=\"consent\">\n          <input type=\"checkbox\" name=\"consent\" required=\"\">\n          <span>Ik heb de <a href=\"https://cdn.prod.website-files.com/6967a86ae7d42af36788b8b2/6981f1a6be403e2f20047187_privacy%20verklaring%20Sunns.pdf\" target=\"_blank\">privacyverklaring<\u002Fa> gelezen en ga akkoord dat Sunns mij terugbelt op het gekozen moment.<\u002Fspan>\n        <\u002Flabel>\n\n        <div class=\"btn-row\">\n          <button type=\"button\" class=\"btn btn-ghost form-back\">← Terug<\u002Fbutton>\n          <button type=\"submit\" class=\"btn btn-primary\">Bevestig afspraak →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCREEN 10: CONFIRMATION ============ -->\n  <section class=\"screen\" data-screen=\"confirm\">\n    <div class=\"confirm\">\n      <div class=\"confirm-mark\">\n        <svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12l5 5L20 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <h2>Je afspraak staat gepland<\u002Fh2>\n      <p class=\"confirm-detail\">Tot zo <strong class=\"confirm-name\">—<\u002Fstrong>.<br>We bellen je <strong class=\"confirm-time\">—<\u002Fstrong> op <strong class=\"confirm-phone\">—<\u002Fstrong>.<\u002Fp>\n\n      <div class=\"confirm-detail-box\">\n        <div class=\"row\"><span class=\"k\">Bevestiging via WhatsApp naar<\u002Fspan><span class=\"v confirm-phone-wa\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Verwachte besparing<\u002Fspan><span class=\"v confirm-besparing\">—<\u002Fspan> <span style=\"color:var(--ink-3);\">/ jaar<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Aanbevolen batterij<\u002Fspan><span class=\"v confirm-batt\">—<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"btn-row\" style=\"justify-content:center; margin-top:32px;\">\n        <button class=\"btn btn-ghost restart\">Opnieuw berekenen<\u002Fbutton>\n        <button class=\"btn btn-primary to-sunns\">Terug naar sunns.nl →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<!-- Tw
